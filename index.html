<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles.css" />
        <title>SAS Core Planner</title>
    </head>
    <body>
        <header>
            <select id="core-select">
                <option value="CCD">CCD</option>
                <option value="CCO">CCO</option>
                <option value="NS">NS</option>
                <option value="SCL">SCL</option>
                <option value="HST">HST</option>
                <option value="AHO">AHO</option>
                <option value="AHP">AHP</option>
                <option value="AHQ">AHQ</option>
                <option value="AHR">AHR</option>
                <option value="WCR">WCR</option>
                <option value="WCD">WCD</option>
                <option value="WC">WC</option>
                <option value="QQ">QQ</option>
                <option value="QR">QR</option>
            </select>
            <div class="course-div">
                <p>Course #</p>
                <p>Course Name</p>
                <p>Credits</p>
                <p>Core Codes</p>
            </div>
        </header>
        <div id="course-list"></div>
        <table id="course-table">
            <tr>
                <th rowspan="2">Course No.</th>
                <th colspan="2">CC (<span id="CCD/CCO">0</span>/2)</th>
                <th rowspan="2">NS (<span id="NS">0</span>/2)</th>
                <th colspan="2">SCL/HST (<span id="SCL/HST">0</span>/2)</th>
                <th colspan="4">AH (courses: <span id="AHO/AHP/AHQ/AHR">0</span>/2, codes: <span id="AH-codes">0</span>/2)</th>
                <th colspan="2">WCR/WCD (<span id="WCR/WCD">0</span>/2)</th>
                <th rowspan="2">WC (<span id="WC">0</span>/1)</th>
                <th colspan="2">QQ/QR (<span id="QQ/QR">0</span>/2)</th>
                <th rowspan="2">Remove</th>
            </tr>
            <tr>
                <th>CCD (<span id="CCD">0</span>/1)</th>
                <th>CCO (<span id="CCO">0</span>/1)</th>
                <th>SCL (<span id="SCL">0</span>/1)</th>
                <th>HST (<span id="HST">0</span>/1)</th>
                <th>AHO (<span id="AHO">0</span>)</th>
                <th>AHP (<span id="AHP">0</span>)</th>
                <th>AHQ (<span id="AHQ">0</span>)</th>
                <th>AHR (<span id="AHR">0</span>)</th>
                <th>WCR (<span id="WCR">0</span>/1)</th>
                <th>WCD (<span id="WCD">0</span>/1)</th>
                <th>QQ (<span id="QQ">0</span>/1)</th>
                <th>QR (<span id="QR">0</span>/1)</th>
            </tr>
        </table>
        <script src="./script.js"></script>
    </body>
</html>
<!--CCD|CCO|NS|SCL|HST|AHo|AHp|AHq|AHr|WCr|WCd|WC|QQ|QR-->
