<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles.css" />
        <title>SAS Core Planner</title>
    </head>
    <body>
        <header>
            <select id="core-select">
                <option value="CCD">CCD (0/1)</option>
                <option value="CCO">CCO (0/1)</option>
                <option value="NS">NS (0/2)</option>
                <option value="SCL">SCL (0/1)</option>
                <option value="HST">HST (0/1)</option>
                <option value="AH">AH (0/2)</option>
                <option value="AHO">AHO (0)</option>
                <option value="AHP">AHP (0)</option>
                <option value="AHQ">AHQ (0)</option>
                <option value="AHR">AHR (0)</option>
                <option value="WCR">WCR (0/1)</option>
                <option value="WCD">WCD (0/1)</option>
                <option value="WC">WC (0/1)</option>
                <option value="QQ">QQ (0/1)</option>
                <option value="QR">QR (0/1)</option>
            </select>
            <div class="course-div">
                <p>Course #</p>
                <p>Course Name</p>
                <p>Credits</p>
                <p>Core Codes</p>
            </div>
        </header>
        <div id="course-list"></div>
        <script src="./script.js"></script>
    </body>
</html>
