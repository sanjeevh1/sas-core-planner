<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles.css" />
        <title>SAS Core Planner</title>
    </head>
    <body>
        <header>
            <select id="core-select">
                <option value="CCD">CCD</option>
                <option value="CCO">CCO</option>
                <option value="NS">NS</option>
                <option value="SCL">SCL</option>
                <option value="HST">HST</option>
                <option value="AHO">AHO</option>
                <option value="AHP">AHP</option>
                <option value="AHQ">AHQ</option>
                <option value="AHR">AHR</option>
                <option value="WCR">WCR</option>
                <option value="WCD">WCD</option>
                <option value="WC">WC</option>
                <option value="QQ">QQ</option>
                <option value="QR">QR</option>
            </select>
            <div class="course-div">
                <p>Course #</p>
                <p>Course Name</p>
                <p>Credits</p>
                <p>Core Codes</p>
            </div>
        </header>
        <div id="course-list"></div>
        <table id="course-table">
            <tr>
                <th rowspan="2">Course No.</th>
                <th colspan="2">CC (<span class="course-count CCD CCO">0</span>/2)</th>
                <th rowspan="2">NS (<span class="course-count NS">0</span>/2)</th>
                <th colspan="2">SCL/HST (<span class="course-count SCL HST">0</span>/2)</th>
                <th colspan="4">AH (courses: <span class="course-count AHO AHP AHQ AHR">0</span>/2, codes: <span id="AH-codes">0</span>/2)</th>
                <th colspan="2">WCR/WCD (<span class="course-count WCR WCD">0</span>/2)</th>
                <th rowspan="2">WC (<span class="course-count WC">0</span>/1)</th>
                <th colspan="2">QQ/QR (<span class="course-count QQ QR">0</span>/2)</th>
                <th rowspan="2">Remove</th>
            </tr>
            <tr>
                <th>CCD (<span class="course-count CCD">0</span>/1)</th>
                <th>CCO (<span class="course-count CCO">0</span>/1)</th>
                <th>SCL (<span class="course-count SCL">0</span>/1)</th>
                <th>HST (<span class="course-count HST">0</span>/1)</th>
                <th>AHO (<span class="course-count AHO">0</span>)</th>
                <th>AHP (<span class="course-count AHP">0</span>)</th>
                <th>AHQ (<span class="course-count AHQ">0</span>)</th>
                <th>AHR (<span class="course-count AHR">0</span>)</th>
                <th>WCR (<span class="course-count WCR">0</span>/1)</th>
                <th>WCD (<span class="course-count WCD">0</span>/1)</th>
                <th>QQ (<span class="course-count QQ">0</span>/1)</th>
                <th>QR (<span class="course-count QR">0</span>/1)</th>
            </tr>
        </table>
        <script src="./script.js"></script>
    </body>
</html>
<!--CCD|CCO|NS|SCL|HST|AHo|AHp|AHq|AHr|WCr|WCd|WC|QQ|QR-->
